name: Update Token Data

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch BELIAL price from DexTools
        run: python3 update-belial.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add belial-data.json
          git diff --staged --quiet || git commit -m "chore: update belial-data $(date -u +%Y-%m-%dT%H:%M)"
          git push
